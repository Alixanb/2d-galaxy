<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/style.css" />
    <title>2D Galaxy</title>
  </head>
  <body>
    <canvas id="canvas-web-gl"></canvas>
    <canvas id="canvas-2d"></canvas>

    <!-- Landing page -->
    <div id="landing">
      <!-- Left: title as graphic element -->
      <div class="landing-left">
        <h1 class="landing-title">2D<br />Galaxy</h1>
        <p class="landing-sub">Gravitational Simulation</p>
      </div>

      <!-- Right: settings panel -->
      <div class="landing-panel">
        <div class="landing-panel-body">
          <div class="landing-panel-label">Configure</div>

          <div class="settings-grid">
            <div class="setting" style="--delay: 0">
              <div class="setting-header">
                <span class="setting-label">Stars</span>
                <span class="setting-value" id="val-stars">5000</span>
              </div>
              <input
                type="range"
                id="inp-stars"
                min="100"
                max="10000"
                value="5000"
                step="100"
              />
            </div>

            <div class="setting" style="--delay: 1">
              <div class="setting-header">
                <span class="setting-label">Galaxy size</span>
                <span class="setting-value" id="val-galaxy-size">0.70</span>
              </div>
              <input
                type="range"
                id="inp-galaxy-size"
                min="10"
                max="200"
                value="70"
                step="5"
              />
            </div>

            <div class="setting" style="--delay: 2">
              <div class="setting-header">
                <span class="setting-label">Sim speed</span>
                <span class="setting-value" id="val-sim-speed">1×</span>
              </div>
              <input
                type="range"
                id="inp-sim-speed"
                min="1"
                max="10"
                value="1"
                step="1"
              />
            </div>

            <div class="setting" style="--delay: 3">
              <div class="setting-header">
                <span class="setting-label">Black holes</span>
                <span class="setting-value" id="val-blackholes">2</span>
              </div>
              <input
                type="range"
                id="inp-blackholes"
                min="0"
                max="3"
                value="1"
                step="1"
              />
            </div>

            <div class="setting setting--toggle" style="--delay: 4">
              <span class="setting-label">Ship path</span>
              <label class="toggle">
                <input type="checkbox" id="inp-show-path" />
                <span class="toggle-track"></span>
              </label>
            </div>

            <div class="setting setting--toggle" style="--delay: 5">
              <span class="setting-label">Black holes</span>
              <label class="toggle">
                <input type="checkbox" id="inp-show-blackholes" checked />
                <span class="toggle-track"></span>
              </label>
            </div>
          </div>

          <button id="start-btn" style="--delay: 6">Start Simulation</button>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
